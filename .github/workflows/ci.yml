name: CI — ASX Price Monitor

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Typecheck ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm check

  # ─── Job 2: Tests ──────────────────────────────────────────────────────────
  test:
    name: Vitest Tests
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      DATABASE_URL: ""
      JWT_SECRET: "ci-test-secret-not-for-production"
      VITE_APP_ID: "ci-test-app"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://manus.im"
      OWNER_OPEN_ID: "ci-owner"
      OWNER_NAME: "CI Test"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "ci-key"
      VITE_FRONTEND_FORGE_API_KEY: "ci-frontend-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  # ─── Job 3: Build Check ────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    env:
      DATABASE_URL: ""
      JWT_SECRET: "ci-build-secret"
      VITE_APP_ID: "ci-build-app"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://manus.im"
      OWNER_OPEN_ID: "ci-owner"
      OWNER_NAME: "CI Build"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "ci-key"
      VITE_FRONTEND_FORGE_API_KEY: "ci-frontend-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check build output
        run: |
          echo "Build artifacts:"
          ls -lh dist/ 2>/dev/null || echo "No dist folder (expected for Manus deploy)"
          echo "Build completed successfully"
