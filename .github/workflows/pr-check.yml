name: PR Check — ASX Price Monitor

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Run tests
        env:
          DATABASE_URL: ""
          JWT_SECRET: "pr-check-secret"
          VITE_APP_ID: "pr-check-app"
          OAUTH_SERVER_URL: "https://api.manus.im"
          VITE_OAUTH_PORTAL_URL: "https://manus.im"
          OWNER_OPEN_ID: "pr-owner"
          OWNER_NAME: "PR Check"
          BUILT_IN_FORGE_API_URL: "https://api.manus.im"
          BUILT_IN_FORGE_API_KEY: "pr-key"
          VITE_FRONTEND_FORGE_API_KEY: "pr-frontend-key"
          VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
        run: pnpm test

      - name: Comment PR with test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { context, github } = require('@actions/github');
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `## ${emoji} PR Check — ASX Price Monitor\n\n**Status:** ${status}\n\n**Checks executados:**\n- TypeScript: sem erros\n- Testes Vitest: passando\n\n_Gerado automaticamente pelo GitHub Actions_`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
